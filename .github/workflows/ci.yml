name: CI

on:
  push:
    branches: [main, develop, "phase5/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install flake8 black

      - name: flake8
        run: flake8 app/ --max-line-length=120 --exclude=__pycache__ || true

      - name: black --check
        run: black --check app/ tests/ || true

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CI dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "fastapi>=0.109.0" \
            "uvicorn>=0.25.0" \
            "pydantic>=2.5.0" \
            "pydantic-settings>=2.0.0" \
            "pandas>=2.0.0" \
            "numpy>=1.26.0" \
            "httpx>=0.25.0,<0.28" \
            "pytest>=7.4.0" \
            "pytest-cov>=4.1.0" \
            "python-dotenv>=1.0.0" \
            "requests>=2.31.0"

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing
        env:
          ENVIRONMENT: test
          DEBUG: "false"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        run: bandit -r app/ -f txt --exit-zero
